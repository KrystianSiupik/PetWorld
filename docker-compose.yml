services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: petworld
      MYSQL_USER: petworld
      MYSQL_PASSWORD: petworld
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "server=mysql;port=3306;database=petworld;user=petworld;password=petworld"
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: gpt-4o-mini

volumes:
  mysql-data:
